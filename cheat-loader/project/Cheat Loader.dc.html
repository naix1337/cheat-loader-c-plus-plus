<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: #06070b; }
  @keyframes cl-scan { from { background-position: 0 0; } to { background-position: 0 6px; } }
  @keyframes cl-scanband { from { transform: translateY(-100%); } to { transform: translateY(560px); } }
  @keyframes cl-shimmer { 0% { transform: translateX(-160%) skewX(-18deg); } 100% { transform: translateX(360%) skewX(-18deg); } }
  @keyframes cl-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.55), 0 10px 30px -8px rgba(0,212,255,0.45); } 50% { box-shadow: 0 0 26px 2px rgba(0,212,255,0.65), 0 10px 38px -6px rgba(0,212,255,0.6); } }
  @keyframes cl-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0; } }
  @keyframes cl-flicker { 0%,100% { opacity: 1; } 92% { opacity: 1; } 94% { opacity: 0.55; } 96% { opacity: 1; } }
  @keyframes cl-spin { to { transform: rotate(360deg); } }
  @keyframes cl-rise { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
</style>
</helmet>
<div style="position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; padding: 24px; font-family: 'Space Grotesk', system-ui, sans-serif; background: radial-gradient(120% 90% at 50% -10%, #0d1622 0%, #0a0a0f 48%, #060709 100%); overflow: hidden;">

  <!-- grid -->
  <div style="position: absolute; inset: -2px; background-image: linear-gradient(rgba(0,212,255,0.045) 1px, transparent 1px), linear-gradient(90deg, rgba(0,212,255,0.045) 1px, transparent 1px); background-size: 42px 42px; -webkit-mask-image: radial-gradient(80% 70% at 50% 40%, #000 30%, transparent 100%); mask-image: radial-gradient(80% 70% at 50% 40%, #000 30%, transparent 100%); pointer-events: none;"></div>
  <!-- scanline texture -->
  <div style="position: absolute; inset: 0; background-image: repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0px, rgba(0,0,0,0) 2px, rgba(0,0,0,0.22) 3px); background-size: 100% 6px; animation: cl-scan 0.5s steps(3) infinite; pointer-events: none; opacity: 0.6;"></div>
  <!-- corner glows -->
  <div style="position: absolute; top: -120px; left: 50%; width: 520px; height: 320px; transform: translateX(-50%); background: radial-gradient(circle, rgba(0,212,255,0.18), transparent 70%); filter: blur(20px); pointer-events: none;"></div>
  <div style="position: absolute; bottom: -140px; left: 30%; width: 460px; height: 300px; background: radial-gradient(circle, rgba(139,92,246,0.14), transparent 70%); filter: blur(24px); pointer-events: none;"></div>

  <!-- CARD -->
  <div style="position: relative; width: min(480px, 100%); border-radius: 18px; padding: 26px 26px 24px; background: linear-gradient(180deg, rgba(18,24,33,0.82), rgba(10,13,18,0.86)); backdrop-filter: blur(22px) saturate(140%); -webkit-backdrop-filter: blur(22px) saturate(140%); border: 1px solid rgba(0,212,255,0.28); box-shadow: 0 0 0 1px rgba(0,212,255,0.06), 0 0 60px -12px rgba(0,212,255,0.35), 0 30px 80px -30px rgba(0,0,0,0.9), inset 0 1px 0 rgba(255,255,255,0.05); overflow: hidden;">

    <!-- moving scan band inside card -->
    <div style="position: absolute; left: 0; right: 0; top: 0; height: 60px; background: linear-gradient(180deg, rgba(0,212,255,0.10), transparent); animation: cl-scanband 4.5s linear infinite; pointer-events: none;"></div>

    <!-- HEADER -->
    <div style="position: relative; display: flex; align-items: center; justify-content: space-between; gap: 12px;">
      <div style="display: flex; align-items: center; gap: 12px;">
        <div style="position: relative; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; border: 1px solid rgba(0,212,255,0.5); border-radius: 10px; background: linear-gradient(145deg, rgba(0,212,255,0.16), rgba(0,212,255,0.02)); box-shadow: 0 0 18px -2px rgba(0,212,255,0.5), inset 0 0 12px rgba(0,212,255,0.18); animation: cl-flicker 5s infinite;">
          <div style="width: 13px; height: 13px; background: #00d4ff; transform: rotate(45deg); border-radius: 2px; box-shadow: 0 0 12px #00d4ff;"></div>
        </div>
        <div style="line-height: 1;">
          <div style="font-size: 18px; font-weight: 700; letter-spacing: 3px; color: #eaf7ff; text-shadow: 0 0 14px rgba(0,212,255,0.6);">{{ title }}</div>
          <div style="margin-top: 5px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #5d7488;">SECURE&nbsp;MODULE&nbsp;LOADER</div>
        </div>
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 600; letter-spacing: 1px; color: #8b5cf6; padding: 5px 10px; border: 1px solid rgba(139,92,246,0.4); border-radius: 999px; background: rgba(139,92,246,0.1); box-shadow: 0 0 14px -4px rgba(139,92,246,0.6);">{{ version }}</div>
    </div>

    <div style="height: 1px; margin: 20px 0 18px; background: linear-gradient(90deg, transparent, rgba(0,212,255,0.35), transparent);"></div>

    <!-- STATUS ROW -->
    <div style="display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px;">
      <div style="min-width: 0;">
        <div style="font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #4f6478; margin-bottom: 6px;">STATUS</div>
        <div style="display: flex; align-items: center; gap: 9px;">
          <div style="width: 7px; height: 7px; border-radius: 50%; background: {{ badgeColor }}; box-shadow: 0 0 10px {{ badgeColor }}; flex: none;"></div>
          <div style="font-size: 17px; font-weight: 600; letter-spacing: 1px; color: #e8f4ff; white-space: nowrap;">{{ phaseLabel }}</div>
        </div>
      </div>
      <div style="font-family: 'JetBrains Mono', monospace; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; color: {{ badgeColor }}; padding: 6px 12px; border: 1px solid {{ badgeBorder }}; border-radius: 999px; background: {{ badgeBg }}; box-shadow: 0 0 16px -6px {{ badgeColor }}; white-space: nowrap;">{{ badgeText }}</div>
    </div>

    <!-- STEP SEGMENTS -->
    <div style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 18px;">
      <sc-for list="{{ steps }}" as="step" hint-placeholder-count="4">
        <div style="height: 4px; border-radius: 3px; background: {{ step.color }}; box-shadow: {{ step.glow }}; transition: background 0.4s ease, box-shadow 0.4s ease;"></div>
      </sc-for>
    </div>

    <!-- PROGRESS -->
    <div style="margin-bottom: 18px;">
      <div style="display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 8px;">
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 2px; color: #4f6478;">PROGRESS</span>
        <span style="font-family: 'JetBrains Mono', monospace; font-size: 15px; font-weight: 700; color: #00d4ff; text-shadow: 0 0 10px rgba(0,212,255,0.6);">{{ progress }}%</span>
      </div>
      <div style="position: relative; height: 9px; border-radius: 6px; background: rgba(0,212,255,0.07); border: 1px solid rgba(0,212,255,0.16); overflow: hidden;">
        <div style="position: absolute; inset: 0 auto 0 0; width: {{ progressWidth }}; background: linear-gradient(90deg, #0094c7, #00d4ff); box-shadow: 0 0 14px rgba(0,212,255,0.7); border-radius: 6px; transition: width 0.18s linear;">
          <div style="position: absolute; top: 0; bottom: 0; left: 0; width: 40px; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent); animation: cl-shimmer 1.6s linear infinite;"></div>
        </div>
      </div>
    </div>

    <!-- LOG CONSOLE -->
    <div style="position: relative; height: 176px; border-radius: 11px; border: 1px solid rgba(0,212,255,0.16); background: linear-gradient(180deg, rgba(2,5,9,0.92), rgba(4,8,12,0.92)); box-shadow: inset 0 0 24px rgba(0,0,0,0.6);">
      <div style="display: flex; align-items: center; gap: 7px; padding: 9px 12px; border-bottom: 1px solid rgba(0,212,255,0.12);">
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #ff5f56;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #ffbd2e;"></div>
        <div style="width: 8px; height: 8px; border-radius: 50%; background: #27c93f;"></div>
        <span style="margin-left: 6px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1.5px; color: #43586b;">console — loader.log</span>
      </div>
      <div ref="{{ logRef }}" style="height: 134px; overflow-y: auto; padding: 9px 12px; font-family: 'JetBrains Mono', monospace; font-size: 11.5px; line-height: 1.62; scrollbar-width: thin; scrollbar-color: rgba(0,212,255,0.3) transparent;">
        <sc-for list="{{ logs }}" as="line" hint-placeholder-count="0">
          <div style="display: flex; gap: 9px; animation: cl-rise 0.3s ease both;">
            <span style="color: #3a4d5e; flex: none;">{{ line.time }}</span>
            <span style="color: {{ line.color }}; flex: 1; word-break: break-word;"><span style="color: #44586a;">{{ line.tag }}</span> {{ line.text }}</span>
          </div>
        </sc-for>
        <div style="display: flex; gap: 9px;">
          <span style="color: #3a4d5e;">{{ cursorTime }}</span>
          <span style="color: #00d4ff;">{{ cursorPrompt }}<span style="display: inline-block; width: 7px; height: 13px; vertical-align: -2px; background: #00d4ff; margin-left: 2px; animation: cl-blink 1s steps(1) infinite; box-shadow: 0 0 6px #00d4ff;"></span></span>
        </div>
      </div>
    </div>

    <!-- LAUNCH -->
    <button onClick="{{ onLaunch }}" disabled="{{ launchDisabled }}" style="margin-top: 18px; width: 100%; padding: 15px; border-radius: 12px; font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 700; letter-spacing: 3px; cursor: {{ launchCursor }}; background: {{ launchBg }}; color: {{ launchColor }}; border: {{ launchBorder }}; box-shadow: {{ launchShadow }}; animation: {{ launchAnimation }}; transition: transform 0.12s ease, filter 0.2s ease; display: flex; align-items: center; justify-content: center; gap: 10px;" style-hover="{{ launchHover }}" style-active="{{ launchActive }}">
      <sc-if value="{{ launchSpinning }}" hint-placeholder-val="{{ false }}">
        <span style="width: 14px; height: 14px; border: 2px solid rgba(3,18,26,0.35); border-top-color: #03121a; border-radius: 50%; display: inline-block; animation: cl-spin 0.6s linear infinite;"></span>
      </sc-if>
      {{ launchLabel }}
    </button>

    <!-- FOOTER -->
    <div style="display: flex; justify-content: space-between; margin-top: 14px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: 1px; color: #3c4e5e;">
      <span>HWID&nbsp;·&nbsp;{{ hwid }}</span>
      <span>{{ ping }}</span>
    </div>

  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{&quot;title&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;Loader&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;version&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;default&quot;:&quot;v2.4.1 Dev Build&quot;,&quot;tsType&quot;:&quot;string&quot;}}">
class Component extends DCLogic {
  state = {
    progress: 0,
    ready: false,
    logs: [],
    launch: 'idle', // idle | launching | done
  };

  LOG_DEFS = [
    { tag: '[sys]',  text: 'Bootstrapping secure environment', type: 'info', at: 2 },
    { tag: '[net]',  text: 'Establishing encrypted tunnel → edge-07', type: 'info', at: 8 },
    { tag: '[auth]', text: 'Reading hardware fingerprint', type: 'info', at: 16 },
    { tag: '[auth]', text: 'Validating license key ····-····-9F2A', type: 'warn', at: 26 },
    { tag: '[auth]', text: 'License valid — tier: PREMIUM', type: 'ok', at: 38 },
    { tag: '[cdn]',  text: 'Fetching module manifest (rev 4471)', type: 'info', at: 47 },
    { tag: '[cdn]',  text: 'Downloading payload — 3.24 MB', type: 'action', at: 55 },
    { tag: '[core]', text: 'Decrypting modules (AES-256)', type: 'info', at: 63 },
    { tag: '[core]', text: 'Mapping target process pid:8124', type: 'info', at: 71 },
    { tag: '[core]', text: 'Allocating memory region 0x7FF…', type: 'info', at: 78 },
    { tag: '[core]', text: 'Resolving imports · bypassing checks', type: 'warn', at: 85 },
    { tag: '[inj]',  text: 'Injecting modules → hooks installed', type: 'action', at: 93 },
    { tag: '[inj]',  text: 'Integrity OK · all systems nominal', type: 'ok', at: 98 },
  ];

  DURATION = 6000;

  componentDidMount() {
    this.mounted = true;
    this.t0 = (typeof performance !== 'undefined' ? performance.now() : Date.now());
    const reduce = typeof matchMedia !== 'undefined' && matchMedia('(prefers-reduced-motion: reduce)').matches;

    if (reduce) {
      const logs = this.LOG_DEFS.map((d, i) => this.makeLog(d, (d.at / 100) * (this.DURATION / 1000)));
      this.setState({ progress: 100, ready: true, logs });
      return;
    }

    this.pushed = 0;
    // Time-based interval (Date.now) self-corrects even if throttled while backgrounded.
    this.timer = setInterval(this.tick, 55);
  }

  componentWillUnmount() {
    this.mounted = false;
    if (this.timer) clearInterval(this.timer);
  }

  componentDidUpdate() {
    if (this.logEl) this.logEl.scrollTop = this.logEl.scrollHeight;
  }

  makeLog(d, elapsedSec) {
    const colors = { info: '#7f9bb0', warn: '#ffcf5c', ok: '#3ef0a3', action: '#00d4ff' };
    return { time: '+' + elapsedSec.toFixed(2), tag: d.tag, text: d.text, color: colors[d.type] };
  }

  tick = (now) => {
    if (!this.mounted) return;
    const t = Math.min(1, (now - this.t0) / this.DURATION);
    // ease-in-out for a slightly organic fill
    const eased = t < 0.5 ? 2 * t * t : 1 - Math.pow(-2 * t + 2, 2) / 2;
    const pct = Math.round(eased * 100);
    const elapsedSec = (now - this.t0) / 1000;

    let pushedNew = false;
    while (this.pushed < this.LOG_DEFS.length && pct >= this.LOG_DEFS[this.pushed].at) {
      this.nextLog = this.makeLog(this.LOG_DEFS[this.pushed], elapsedSec);
      this.queued = (this.queued || []).concat(this.nextLog);
      this.pushed++;
      pushedNew = true;
    }

    const done = t >= 1;
    this.setState(s => ({
      progress: pct,
      ready: done ? true : s.ready,
      logs: pushedNew ? s.logs.concat(this.queued.slice(s.logs.length)) : s.logs,
    }));

    if (done && this.timer) { clearInterval(this.timer); this.timer = null; }
  };

  onLaunch = () => {
    if (!this.state.ready || this.state.launch !== 'idle') return;
    this.setState({ launch: 'launching' });
    setTimeout(() => { if (this.mounted) this.setState({ launch: 'done' }); }, 1500);
  };

  renderVals() {
    const { progress, ready, logs, launch } = this.state;
    const ACCENT = '#00d4ff', PURPLE = '#8b5cf6', GREEN = '#3ef0a3', DIM = '#26323d';

    const step = ready ? 3 : progress < 25 ? 0 : progress < 50 ? 1 : 2;

    const steps = [0, 1, 2, 3].map(i => {
      if (i < step) return { color: GREEN, glow: '0 0 10px rgba(62,240,163,0.55)' };
      if (i === step && !ready) return { color: ACCENT, glow: '0 0 12px rgba(0,212,255,0.7)' };
      if (i === step && ready) return { color: GREEN, glow: '0 0 12px rgba(62,240,163,0.7)' };
      return { color: DIM, glow: 'none' };
    });

    const phaseLabel = ['INITIALIZING', 'CHECKING LICENSE', 'INJECTING', 'READY'][step];

    const badgeMap = [
      { text: 'CONNECTING',    color: PURPLE },
      { text: 'AUTHENTICATED', color: GREEN },
      { text: 'INJECTING',     color: ACCENT },
      { text: 'READY',         color: GREEN },
    ];
    const b = badgeMap[step];
    const hexA = (hex, a) => {
      const n = parseInt(hex.slice(1), 16);
      return `rgba(${(n >> 16) & 255},${(n >> 8) & 255},${n & 255},${a})`;
    };

    const spinning = launch === 'launching';
    let launchLabel = 'LAUNCH', launchBg, launchColor, launchBorder, launchShadow, launchAnimation = 'none',
        launchCursor = 'not-allowed', launchHover = {}, launchActive = {};

    if (!ready) {
      launchBg = '#0e1620'; launchColor = '#39495a';
      launchBorder = '1px solid rgba(255,255,255,0.06)'; launchShadow = 'none';
    } else if (launch === 'done') {
      launchLabel = 'INJECTED ✓'; launchBg = hexA(GREEN, 0.12); launchColor = GREEN;
      launchBorder = '1px solid ' + hexA(GREEN, 0.5);
      launchShadow = '0 0 24px -6px ' + hexA(GREEN, 0.6);
    } else if (launch === 'launching') {
      launchLabel = 'LAUNCHING'; launchBg = 'linear-gradient(180deg,#00c3ec,#0099c2)'; launchColor = '#03121a';
      launchBorder = 'none'; launchShadow = '0 10px 30px -8px rgba(0,212,255,0.5)';
      launchCursor = 'wait';
    } else {
      launchLabel = 'LAUNCH'; launchBg = 'linear-gradient(180deg,#1ee0ff,#00a6cf)'; launchColor = '#03121a';
      launchBorder = 'none'; launchShadow = '0 10px 30px -8px rgba(0,212,255,0.5)';
      launchCursor = 'pointer'; launchAnimation = 'cl-pulse 1.8s ease-in-out infinite';
      launchHover = { filter: 'brightness(1.08)', transform: 'translateY(-1px)' };
      launchActive = { transform: 'translateY(1px) scale(0.99)' };
    }

    return {
      title: this.props.title ?? 'AETHER',
      version: this.props.version ?? 'v2.4.1',
      progress,
      progressWidth: progress + '%',
      steps,
      phaseLabel,
      badgeText: b.text,
      badgeColor: b.color,
      badgeBorder: hexA(b.color, 0.4),
      badgeBg: hexA(b.color, 0.1),
      logs,
      logRef: (el) => { this.logEl = el; },
      cursorTime: ready ? '+' + (this.DURATION / 1000).toFixed(2) : '',
      cursorPrompt: ready ? 'ready ›' : '',
      onLaunch: this.onLaunch,
      launchDisabled: !ready || launch !== 'idle',
      launchLabel, launchBg, launchColor, launchBorder, launchShadow,
      launchAnimation, launchCursor, launchHover, launchActive,
      launchSpinning: spinning,
      hwid: 'A7F3-1C9E-44B0',
      ping: ready ? '24ms · edge-07' : 'syncing…',
    };
  }
}
</script>
</body>
</html>
