          '</div>' +
          '<div class="op-body" style="padding:20px 22px;font-size:14.5px;line-height:1.72;color:#c2d2df;">' + OP_BODY_HTML + '</div>' +
          '<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;padding:13px 18px;border-top:1px solid rgba(0,212,255,0.1);background:rgba(2,6,10,0.3);">' +
            '<button id="btn-like-op" style="display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:9px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:600;color:' + (opLiked ? '#03121a' : '#9fc6dc') + ';background:' + (opLiked ? 'linear-gradient(180deg,#1ee0ff,#00a6cf)' : 'rgba(2,6,10,0.5)') + ';border:1px solid ' + (opLiked ? 'transparent' : 'rgba(0,212,255,0.16)') + ';">▲ ' + opLikeCount + '</button>' +
            '<button id="btn-quote-op" style="padding:7px 13px;border-radius:9px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:600;color:#8fb0c6;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">❝ Quote</button>' +
            '<button id="btn-share-op" style="padding:7px 13px;border-radius:9px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:600;color:#8fb0c6;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">↗ Share</button>' +
            '<button id="btn-bookmark-op" style="margin-left:auto;padding:7px 11px;border-radius:9px;cursor:pointer;font-size:14px;line-height:1;color:' + (state.opBookmarked ? '#ffcf5c' : '#3c4e5e') + ';background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">' + (state.opBookmarked ? '★' : '☆') + '</button>' +
          '</div>' +
        '</div>' +

        // REPLIES HEADER
        '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;">' +
          '<div id="reply-count" style="font-family:\'JetBrains Mono\',monospace;font-size:11px;letter-spacing:1.5px;color:#4f6478;">' + totalReplies + ' REPLIES</div>' +
          '<button id="btn-sort" style="background:transparent;border:none;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:10px;letter-spacing:1.5px;color:#00d4ff;">SORT · ' + (state.sort === 'oldest' ? 'OLDEST' : 'TOP') + '</button>' +
        '</div>' +

        // REPLIES LIST
        '<div id="replies-list" style="display:flex;flex-direction:column;gap:14px;">' + repliesHtml + '</div>' +

        // REPLY COMPOSER
        '<div id="composer" style="margin-top:22px;border-radius:16px;background:linear-gradient(180deg,rgba(18,24,33,0.85),rgba(10,13,18,0.9));border:1px solid rgba(0,212,255,0.28);box-shadow:0 0 44px -16px rgba(0,212,255,0.45);overflow:hidden;">' +
          '<div style="display:flex;align-items:center;gap:11px;padding:14px 18px;border-bottom:1px solid rgba(0,212,255,0.12);">' +
            '<div style="position:relative;width:36px;height:36px;flex:none;border-radius:10px;background:' + userPalette + ';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#03121a;">' + userInitial +
              '<span style="position:absolute;right:-2px;bottom:-2px;width:9px;height:9px;border-radius:50%;background:#3ef0a3;border:2px solid #0c1017;"></span>' +
            '</div>' +
            '<div style="line-height:1.2;">' +
              '<div style="font-size:13px;font-weight:700;color:#eaf7ff;">' + esc(userName) + '</div>' +
              '<div style="font-family:\'JetBrains Mono\',monospace;font-size:9px;letter-spacing:1px;color:' + userRankStyle.color + ';">reply as ' + userRank + '</div>' +
            '</div>' +
          '</div>' +
          '<div style="padding:14px 18px;">' +
            '<textarea id="composer-textarea" placeholder="Add to the discussion… markdown &amp; quotes supported" style="width:100%;min-height:96px;resize:vertical;padding:12px 14px;border-radius:11px;background:rgba(2,6,10,0.6);border:1px solid rgba(0,212,255,0.18);outline:none;color:#d6e6f2;font-family:\'JetBrains Mono\',monospace;font-size:13px;line-height:1.6;">' + esc(state.draft) + '</textarea>' +
            '<div style="display:flex;align-items:center;gap:8px;margin-top:12px;flex-wrap:wrap;">' +
              '<div style="display:flex;gap:6px;">' +
                '<button class="btn-toolbar" data-tag="B" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#7f9bb0;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">B</button>' +
                '<button class="btn-toolbar" data-tag="I" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#7f9bb0;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">I</button>' +
                '<button class="btn-toolbar" data-tag="/" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#7f9bb0;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">/</button>' +
                '<button class="btn-toolbar" data-tag="@" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#7f9bb0;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">@</button>' +
                '<button class="btn-toolbar" data-tag="#" style="width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;cursor:pointer;font-family:\'JetBrains Mono\',monospace;font-size:12px;font-weight:700;color:#7f9bb0;background:rgba(2,6,10,0.5);border:1px solid rgba(0,212,255,0.14);">#</button>' +
              '</div>' +
              '<button id="btn-post-reply" style="margin-left:auto;display:flex;align-items:center;gap:8px;padding:11px 22px;border-radius:10px;border:none;white-space:nowrap;cursor:' + (canReply ? 'pointer' : 'not-allowed') + ';font-family:\'Space Grotesk\',sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;color:' + (canReply ? '#03121a' : '#3c4e5e') + ';background:' + (canReply ? 'linear-gradient(180deg,#1ee0ff,#00a6cf)' : 'rgba(2,6,10,0.5)') + ';box-shadow:' + (canReply ? '0 8px 24px -8px rgba(0,212,255,0.55)' : 'none') + ';">POST REPLY</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div>' +
    '</div>';

    // set reply body text via textContent (XSS safe)
    var replyCards = app.querySelectorAll('.reply-card');
    for (var j = 0; j < replyCards.length; j++) {
      var card = replyCards[j];
      var bodyEl = card.querySelector('.r-body');
      var replyId = parseInt(card.getAttribute('data-reply-id'), 10);
      for (var k = 0; k < sorted.length; k++) {
        if (sorted[k].id === replyId) {
          if (bodyEl) bodyEl.textContent = sorted[k].body;
          break;
        }
      }
    }

    // bind events
    bindEvents();
  }

  // event binding
  function bindEvents() {
    var app = document.getElementById('app');
    if (!app) return;

    var btnLikeOp = document.getElementById('btn-like-op');
    if (btnLikeOp) btnLikeOp.onclick = function() { state.opLiked = !state.opLiked; render(); };

    var btnQuoteOp = document.getElementById('btn-quote-op');
    if (btnQuoteOp) btnQuoteOp.onclick = function() { quoteInto('kernel_d', '"v2.4.1 changelog — smoothing rework"'); };

    var btnShareOp = document.getElementById('btn-share-op');
    if (btnShareOp) {
      btnShareOp.onclick = function() {
        if (navigator.share) {
          navigator.share({ title: THREAD_META.title, url: window.location.href });
        } else {
          var dummy = document.createElement('input');
          dummy.value = window.location.href;
          document.body.appendChild(dummy);
          dummy.select();
          document.execCommand('copy');
          document.body.removeChild(dummy);
          btnShareOp.style.color = '#3ef0a3';
          btnShareOp.textContent = '✓ Copied';
          setTimeout(function() { render(); }, 2000);
        }
      };
    }

    var btnBookmarkOp = document.getElementById('btn-bookmark-op');
    if (btnBookmarkOp) btnBookmarkOp.onclick = function() { state.opBookmarked = !state.opBookmarked; render(); };

    var btnSort = document.getElementById('btn-sort');
    if (btnSort) btnSort.onclick = function() { state.sort = state.sort === 'oldest' ? 'top' : 'oldest'; render(); };

    // reply interactions via event delegation
    var replyList = document.getElementById('replies-list');
    if (replyList) {
      replyList.onclick = function(e) {
        var target = e.target;
        while (target && target !== replyList) {
          if (target.classList.contains('btn-like-reply')) {
            var rid = parseInt(target.getAttribute('data-reply-id'), 10);
            state.likes['r' + rid] = !state.likes['r' + rid];
            render();
            return;
          }
          if (target.classList.contains('btn-quote-reply')) {
            var au = target.getAttribute('data-reply-author');
            var sn = target.getAttribute('data-reply-snippet');
            quoteInto(au, sn);
            return;
          }
          target = target.parentNode;
        }
      };
    }

    // composer
    var textarea = document.getElementById('composer-textarea');
    if (textarea) {
      textarea.oninput = function(e) { state.draft = e.target.value; updatePostButton(); };
    }

    // toolbar buttons
    var toolbarBtns = app.querySelectorAll('.btn-toolbar');
    for (var i = 0; i < toolbarBtns.length; i++) {
      (function(btn) {
        btn.onclick = function() {
          var tag = btn.getAttribute('data-tag');
          var ta = document.getElementById('composer-textarea');
          if (!ta) return;
          var start = ta.selectionStart;
          var end = ta.selectionEnd;
          var text = ta.value;
          var before = text.substring(0, start);
          var selected = text.substring(start, end);
          var after = text.substring(end);
          var wrap;
          switch (tag) {
            case 'B': wrap = ['**', '**']; break;
            case 'I': wrap = ['_', '_']; break;
            case '/': wrap = ['//', '']; break;
            case '@': wrap = ['@', ' ']; break;
            case '#': wrap = ['#', '']; break;
            default: wrap = [tag, ''];
          }
          var insertion = wrap[0] + (selected || '') + wrap[1];
          ta.value = before + insertion + after;
          state.draft = ta.value;
          ta.focus();
          var newPos = start + insertion.length;
          ta.selectionStart = newPos;
          ta.selectionEnd = newPos;
          updatePostButton();
        };
      })(toolbarBtns[i]);
    }

    var btnPost = document.getElementById('btn-post-reply');
    if (btnPost) btnPost.onclick = function() { postReply(); };

    // Ctrl+Enter to post
    if (textarea) {
      textarea.onkeydown = function(e) {
        if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) { e.preventDefault(); postReply(); }
      };
    }
  }

  // actions
  function quoteInto(author, snippet) {
    var block = '> ' + author + ' wrote: ' + snippet + '\n\n';
    state.draft = (state.draft ? state.draft + '\n' : '') + block;
    render();
    var ta = document.getElementById('composer-textarea');
    if (ta) {
      ta.focus();
      var len = ta.value.length;
      ta.selectionStart = len;
      ta.selectionEnd = len;
    }
    var composer = document.getElementById('composer');
    if (composer) composer.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  function postReply() {
    var txt = state.draft.trim();
    if (!txt) return;
    uidCounter++;
    var newReply = {
      id: uidCounter,
      author: state.currentUser ? state.currentUser.username : 'n0vakill',
      rank: state.currentUser ? state.currentUser.rank : 'PREMIUM',
      av: 'cyan',
      time: 'just now',
      likes: 0,
      body: txt,
      fresh: true,
    };
    state.extraReplies.push(newReply);
    state.draft = '';
    render();
    var replyList = document.getElementById('replies-list');
    if (replyList && replyList.lastElementChild) {
      replyList.lastElementChild.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }
  }

  function updatePostButton() {
    var btn = document.getElementById('btn-post-reply');
    if (!btn) return;
    var can = state.draft.trim().length > 0;
    btn.style.cursor = can ? 'pointer' : 'not-allowed';
    btn.style.color = can ? '#03121a' : '#3c4e5e';
    btn.style.background = can ? 'linear-gradient(180deg,#1ee0ff,#00a6cf)' : 'rgba(2,6,10,0.5)';
    btn.style.boxShadow = can ? '0 8px 24px -8px rgba(0,212,255,0.55)' : 'none';
  }

  render();
})();
</script>
</body>
</html>
