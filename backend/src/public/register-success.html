<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Account created — insolution.cloud</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #12121a;
      border: 1px solid #1e1e2a;
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 460px;
      text-align: center;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .checkmark {
      width: 64px;
      height: 64px;
      background: rgba(76,175,80,0.15);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 32px;
      color: #4caf50;
    }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 8px; }
    p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 8px; }
    .btn {
      display: inline-block;
      margin-top: 24px;
      padding: 14px 32px;
      background: #00d4ff;
      color: #0a0a0f;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.2s;
    }
    .btn:hover { background: #00bde6; }
    .btn-secondary {
      display: inline-block;
      margin-top: 12px;
      padding: 12px 24px;
      background: transparent;
      color: #00d4ff;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      font-size: 14px;
      text-decoration: none;
      transition: border-color 0.2s;
    }
    .btn-secondary:hover { border-color: #00d4ff; }
    @media (max-width: 480px) {
      .container { padding: 32px 20px; border-radius: 0; border: none; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="checkmark">✓</div>
    <h1>Account created successfully!</h1>
    <p>You can now log in with the Windows client using your username and password.</p>
    <p style="color:#666;font-size:12px;">Your account is ready — no email verification required.</p>
    <a href="https://github.com/nix1337/ntztwerktool/releases" class="btn" target="_blank">
      Download Windows Client
    </a>
    <br />
    <a href="/register" class="btn-secondary">← Create another account</a>
  </div>
</body>
</html>
