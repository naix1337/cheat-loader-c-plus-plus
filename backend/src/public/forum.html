<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Forum — insolution.cloud</title>
<script src="/forum.js"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #06070b; font-family: 'Space Grotesk', system-ui, sans-serif; color: #c7d6e2; }
  @keyframes ff-scan { from { background-position: 0 0; } to { background-position: 0 6px; } }
  @keyframes ff-pulse { 0%,100% { box-shadow: 0 0 0 0 rgba(0,212,255,0.5), 0 8px 24px -8px rgba(0,212,255,0.45); } 50% { box-shadow: 0 0 22px 1px rgba(0,212,255,0.6), 0 8px 30px -6px rgba(0,212,255,0.6); } }
  @keyframes ff-blink { 0%,49% { opacity: 1; } 50%,100% { opacity: 0.25; } }
  @keyframes ff-rise { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes ff-spin { to { transform: rotate(360deg); } }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-thumb { background: rgba(0,212,255,0.25); border-radius: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  a { color: inherit; text-decoration: none; }
  input, textarea, button { font-family: inherit; }
</style>
</head>
<body>
<div id="app">
  <div style="display:flex;align-items:center;justify-content:center;min-height:100vh;gap:12px;font-family:'JetBrains Mono',monospace;font-size:13px;color:#4f6478;">
    <span class="ff-spinner" style="width:16px;height:16px;border:2px solid rgba(0,212,255,0.2);border-top-color:#00d4ff;border-radius:50%;display:inline-block;animation:ff-spin 0.6s linear infinite;"></span>
    LOADING FORUM…
  </div>
</div>
</body>
</html>
